name: Release Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  npm_package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Contract tests
        run: npm run test:contracts

      - name: Pack
        run: npm pack

      - name: CLI smoke test from tarball
        run: |
          mkdir smoke-npm
          cd smoke-npm
          npm init -y
          npm install ../iranti-*.tgz
          ./node_modules/.bin/iranti help

  python_package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build python package
        run: python -m build clients/python --outdir clients/python/dist

      - name: Twine metadata check
        run: python -m twine check clients/python/dist/*

      - name: Smoke install wheel
        run: |
          python -m venv .venv-smoke
          source .venv-smoke/bin/activate
          pip install clients/python/dist/iranti-*.whl
          python -c "import iranti; from iranti import IrantiClient; print(iranti.__version__); assert bool(IrantiClient)"
