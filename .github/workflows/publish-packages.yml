name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Version tag to validate against package versions (for example v0.1.1)
        required: false
        type: string

jobs:
  verify_release:
    name: Verify Release Versions and Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify release version alignment
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: npx ts-node scripts/check-release-version.ts

      - name: Build
        run: npm run build

      - name: Contract tests
        run: npm run test:contracts

      - name: Pack Node package
        run: npm pack

      - name: CLI smoke test from tarball
        run: |
          mkdir smoke-npm
          cd smoke-npm
          npm init -y
          npm install ../iranti-*.tgz
          ./node_modules/.bin/iranti help

      - name: Build Python package
        run: python -m pip install --upgrade pip build twine && python -m build clients/python --outdir clients/python/dist

      - name: Twine metadata check
        run: python -m twine check clients/python/dist/*

      - name: Smoke install wheel
        run: |
          python -m venv .venv-smoke
          source .venv-smoke/bin/activate
          pip install clients/python/dist/iranti-*.whl
          python -c "import iranti; from iranti import IrantiClient; print(iranti.__version__); assert bool(IrantiClient)"

      - name: Expose version
        id: version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

  publish_npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: verify_release
    if: github.event_name == 'release'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish_pypi:
    name: Publish Python client
    runs-on: ubuntu-latest
    needs: verify_release
    if: github.event_name == 'release'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build Python package
        run: |
          python -m pip install --upgrade pip build
          python -m build clients/python --outdir clients/python/dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
